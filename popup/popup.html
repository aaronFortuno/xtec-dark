<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #191208;
      color: #c2c5aa;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header svg {
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      color: #ddd8c4;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: #221a0e;
      border: 1px solid #3d3020;
      border-radius: 10px;
      margin-bottom: 12px;
    }
    .toggle-row span {
      font-size: 13px;
      font-weight: 500;
    }
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #3d3020;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.25s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #b6ad90;
      border-radius: 50%;
      transition: transform 0.25s;
    }
    input:checked + .slider {
      background: #7f4f24;
    }
    input:checked + .slider::before {
      transform: translateX(20px);
      background: #f0ead6;
    }
    .status {
      text-align: center;
      font-size: 11px;
      color: #7a6e5a;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="#936639" stroke-width="2"/>
      <path d="M9 14.5C9 11.5 11.5 9 14 9C13 11 14 13 16 14C18 15 19 17 19 18.5C19 20.5 17 22 14 22C11 22 9 20 9 17.5" stroke="#a68a64" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="20" cy="8" r="2.5" fill="#c8a878"/>
    </svg>
    <h1>IOC XTEC<br>Dark Mode</h1>
  </div>
  <div class="toggle-row">
    <span>Mode fosc</span>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <p class="status" id="status">Activat</p>

  <script src="popup.js"></script>
</body>
</html>
